<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>日本人名字ランキング ビジュアライズ</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    #container {
      width: 100%;
      max-width: 600px;
      background: white;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      overflow: hidden;
    }

    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 30px 20px;
      text-align: center;
    }

    .header h1 {
      font-size: 28px;
      margin-bottom: 10px;
    }

    .header p {
      font-size: 14px;
      opacity: 0.9;
    }

    .content {
      padding: 40px 20px;
      min-height: 500px;
      position: relative;
    }

    .view {
      opacity: 0;
      transform: scale(0.95);
      transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
      pointer-events: none;
      position: absolute;
      width: 100%;
      left: 0;
      top: 40px;
    }

    .view.active {
      opacity: 1;
      transform: scale(1);
      pointer-events: auto;
      position: relative;
      top: 0;
    }

    .view h2 {
      text-align: center;
      color: #333;
      margin-bottom: 30px;
      font-size: 20px;
    }

    /* ランキング表 */
    .ranking-table {
      width: 100%;
      border-collapse: collapse;
    }

    .ranking-table thead {
      background: #f8f9fa;
    }

    .ranking-table th {
      padding: 12px;
      text-align: left;
      font-weight: 600;
      color: #333;
      border-bottom: 2px solid #667eea;
      white-space: nowrap;
    }

    .ranking-table td {
      padding: 16px 12px;
      border-bottom: 1px solid #eee;
      color: #555;
    }

    .ranking-table tr {
      transition: background 0.3s;
    }

    .ranking-table tbody tr:hover {
      background: #f8f9fa;
    }

    .ranking-number {
      font-weight: 700;
      color: #667eea;
      font-size: 18px;
      width: 90px;
      white-space: nowrap;
    }

    .ranking-name {
      font-weight: 600;
      color: #333;
      font-size: 16px;
    }

    .ranking-count {
      text-align: right;
      color: #764ba2;
      font-weight: 600;
      white-space: nowrap;
    }

    /* 円グラフ */
    #chartContainer {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #pieChart {
      max-width: 100%;
    }

    /* コントロール */
    .controls {
      display: flex;
      gap: 12px;
      justify-content: center;
      padding: 20px 20px 0;
      flex-wrap: wrap;
    }

    button {
      padding: 10px 24px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.3s;
      font-weight: 600;
    }

    .btn-toggle {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      flex: 1;
      min-width: 150px;
    }

    .btn-toggle:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
    }

    .btn-auto {
      background: #f8f9fa;
      color: #333;
      border: 2px solid #667eea;
    }

    .btn-auto.active {
      background: #667eea;
      color: white;
    }

    .btn-auto:hover {
      transform: translateY(-2px);
    }

    /* インジケーター */
    .indicator {
      text-align: center;
      margin-top: 20px;
      font-size: 12px;
      color: #999;
    }

    .dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin: 0 4px;
      background: #ddd;
      transition: all 0.3s;
    }

    .dot.active {
      background: #667eea;
      transform: scale(1.3);
    }

    @media (max-width: 600px) {
      .header h1 {
        font-size: 24px;
      }

      .content {
        padding: 30px 15px;
        min-height: 400px;
      }

      .ranking-table th,
      .ranking-table td {
        padding: 12px 8px;
        font-size: 14px;
      }

      .ranking-number {
        width: 80px;
      }

      button {
        font-size: 13px;
        padding: 8px 16px;
      }
    }
  </style>
</head>
<body>
  <div id="container">
    <div class="header">
      <h1>📊 日本人名字ランキング</h1>
      <p>「橋」が付く名字の人口分布をビジュアライズ</p>
    </div>

    <div class="controls">
      <button class="btn-toggle" id="toggleBtn">📈 グラフに切り替え</button>
      <button class="btn-auto" id="autoBtn">🔄 自動切替: OFF</button>
    </div>

    <div class="content">
      <!-- ランキング表ビュー -->
      <div id="tableView" class="view active">
        <h2>順位表</h2>
        <table class="ranking-table">
          <thead>
            <tr>
              <th>全国順位</th>
              <th>名字</th>
              <th style="text-align: right;">人数</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td class="ranking-number">3位</td>
              <td class="ranking-name">高橋</td>
              <td class="ranking-count">1,361,000人</td>
            </tr>
            <tr>
              <td class="ranking-number">9位</td>
              <td class="ranking-name">小林</td>
              <td class="ranking-count">996,000人</td>
            </tr>
            <tr>
              <td class="ranking-number">141位</td>
              <td class="ranking-name">大橋</td>
              <td class="ranking-count">137,000人</td>
            </tr>
            <tr>
              <td class="ranking-number">175位</td>
              <td class="ranking-name">石橋</td>
              <td class="ranking-count">114,000人</td>
            </tr>
            <tr>
              <td class="ranking-number">972位</td>
              <td class="ranking-name">古橋</td>
              <td class="ranking-count">18,200人</td>
            </tr>
            <tr>
              <td class="ranking-number">1,192位</td>
              <td class="ranking-name">小橋</td>
              <td class="ranking-count">14,200人</td>
            </tr>
          </tbody>
        </table>
      </div>

      <!-- 円グラフビュー -->
      <div id="chartView" class="view">
        <h2>シェア分析（円グラフ）</h2>
        <div id="chartContainer">
          <canvas id="pieChart"></canvas>
        </div>
      </div>
    </div>

    <div class="indicator">
      <span class="dot active" data-view="table"></span>
      <span class="dot" data-view="chart"></span>
    </div>
  </div>

  <script>
    // データ定義
    const namesData = {
      labels: ["高橋", "小林", "大橋", "石橋", "古橋", "小橋"],
      data: [1361000, 996000, 137000, 114000, 18200, 14200],
      colors: ["#FF6B6B", "#4ECDC4", "#45B7D1", "#FFA07A", "#98D8C8", "#FF8A80"]
    };

    // 合計を計算
    const total = namesData.data.reduce((a, b) => a + b, 0);

    // Chart.js 円グラフ初期化
    const ctx = document.getElementById('pieChart').getContext('2d');
    let pieChart = new Chart(ctx, {
      type: 'doughnut',
      data: {
        labels: namesData.labels,
        datasets: [{
          data: namesData.data,
          backgroundColor: namesData.colors,
          borderColor: 'white',
          borderWidth: 3
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: true,
        plugins: {
          legend: {
            position: 'bottom',
            labels: {
              padding: 20,
              font: { size: 14, weight: '600' },
              color: '#333'
            }
          },
          datalabels: {
            color: '#000',
            font: {
              weight: 'bold',
              size: 14
            },
            formatter: (value, ctx) => {
              const percentage = ((value / total) * 100).toFixed(1);
              return percentage + '%';
            }
          }
        },
        animation: {
          animateScale: true,
          duration: 800
        }
      },
      plugins: [ChartDataLabels]
    });

    // UI要素の取得
    const tableView = document.getElementById('tableView');
    const chartView = document.getElementById('chartView');
    const toggleBtn = document.getElementById('toggleBtn');
    const autoBtn = document.getElementById('autoBtn');
    const dots = document.querySelectorAll('.dot');

    let currentView = 'table';
    let autoMode = false;
    let autoInterval = null;

    // ビュー切替関数
    function switchView(targetView) {
      if (targetView === currentView) return;

      currentView = targetView;

      if (targetView === 'table') {
        tableView.classList.add('active');
        chartView.classList.remove('active');
        toggleBtn.textContent = '📈 グラフに切り替え';
      } else {
        tableView.classList.remove('active');
        chartView.classList.add('active');
        toggleBtn.textContent = '📋 順位表に切り替え';
        setTimeout(() => {
          pieChart.resize();
          pieChart.update();
        }, 100);
      }

      // インジケーター更新
      dots.forEach(dot => {
        dot.classList.remove('active');
        if (dot.getAttribute('data-view') === targetView) {
          dot.classList.add('active');
        }
      });
    }

    // ボタンイベント
    toggleBtn.addEventListener('click', () => {
      const nextView = currentView === 'table' ? 'chart' : 'table';
      switchView(nextView);
    });

    // 自動切替モード
    autoBtn.addEventListener('click', () => {
      autoMode = !autoMode;

      if (autoMode) {
        autoBtn.classList.add('active');
        autoBtn.textContent = '🔄 自動切替: ON';

        // 4秒ごとに自動切替
        autoInterval = setInterval(() => {
          const nextView = currentView === 'table' ? 'chart' : 'table';
          switchView(nextView);
        }, 4000);
      } else {
        autoBtn.classList.remove('active');
        autoBtn.textContent = '🔄 自動切替: OFF';
        clearInterval(autoInterval);
      }
    });

    // インジケータークリック
    dots.forEach(dot => {
      dot.addEventListener('click', () => {
        const targetView = dot.getAttribute('data-view');
        switchView(targetView);
      });
    });

    // ウィンドウリサイズ対応
    window.addEventListener('resize', () => {
      if (currentView === 'chart') {
        pieChart.resize();
      }
    });
  </script>
</body>
</html>
